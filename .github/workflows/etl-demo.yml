# 저장소 루트(a) 기준 — 실제 스크립트는 ai_coding_web/
name: Scheduled ETL Demo

on:
  workflow_dispatch:
  schedule:
    - cron: "0 15 * * *"

defaults:
  run:
    working-directory: ai_coding_web

jobs:
  run-etl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run ETL
        env:
          ET_API_BASE: ${{ secrets.ET_API_BASE }}
          ETL_SHARED_SECRET: ${{ secrets.ETL_SHARED_SECRET }}
        run: python etl_demo.py
