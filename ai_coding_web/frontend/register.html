<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DataGarden | 회원가입</title>
    <meta name="description" content="DataGarden 회원가입" />
    <link rel="stylesheet" href="./assets/css/styles.css" />
  </head>
  <body data-page="register">
    <a class="skip-link" href="#main">본문으로 건너뛰기</a>

    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="./index.html" aria-label="DataGarden 홈">DataGarden</a>

        <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="site-nav">
          <span class="sr-only">메뉴 열기</span>
          <span class="nav-toggle__bar"></span>
          <span class="nav-toggle__bar"></span>
          <span class="nav-toggle__bar"></span>
        </button>

        <nav id="site-nav" class="site-nav" aria-label="주 메뉴">
          <a class="nav-link" href="./index.html" data-nav="home">홈</a>
          <a class="nav-link" href="./agri-analytics.html" data-nav="agri-analytics">농산물 가격</a>
          <a class="nav-link" href="./agri-news.html" data-nav="agri-news">뉴스</a>
          <a class="nav-link" href="./agri-weather.html" data-nav="agri-weather">기상</a>
          
          
          
          
        </nav>
      </div>
    </header>

    <main id="main" class="site-main">
      <section class="hero">
        <div class="container">
          <p class="badge">회원가입</p>
          <h1 class="page-title">DataGarden 계정 만들기</h1>
          <p class="page-subtitle">회원가입 후 나만의 분석 대시보드를 구성할 수 있습니다.</p>
        </div>
      </section>

      <section class="panel">
        <div class="container">
          <article class="card card--form" style="max-width: 480px; margin: 0 auto;">
            <h2 class="panel-title">회원가입</h2>
            <p class="panel-desc">닉네임, 이메일, 비밀번호를 입력하세요.</p>

            <div class="alert alert--error" id="register-error" role="alert" aria-live="polite" hidden></div>
            <div class="alert alert--success" id="register-success" role="status" aria-live="polite" hidden></div>

            <form class="form" id="register-form" novalidate>
              <label class="field">
                <span class="field__label">닉네임</span>
                <input class="input" type="text" name="name" autocomplete="nickname" placeholder="예: 데모 사용자" required />
              </label>

              <label class="field">
                <span class="field__label">이메일</span>
                <input class="input" type="email" name="email" autocomplete="email" placeholder="예: hello@example.com" required />
              </label>

              <label class="field">
                <span class="field__label">비밀번호</span>
                <input class="input" type="password" name="password" autocomplete="new-password" placeholder="8자 이상" required />
              </label>

              <button class="btn" type="submit">회원가입</button>
              <a class="btn btn--ghost" href="./index.html">홈</a>
            </form>

            <p style="margin-top: 1.5rem; text-align: center; font-size: 0.9rem;">
              이미 계정이 있으신가요? <a href="./login.html">로그인</a>
            </p>
          </article>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <a class="brand brand--sm" href="./index.html" aria-label="DataGarden 홈">DataGarden</a>
        <p class="muted">회원가입</p>
      </div>
    </footer>

    <script src="./assets/js/config.js"></script>
    <script src="./assets/js/common.js"></script>
    <script src="./assets/js/auth.js"></script>
    <script src="./assets/js/login.js"></script>
  </body>
</html>
