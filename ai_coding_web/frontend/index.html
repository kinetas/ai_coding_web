<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Et | Trend word cloud</title>
    <meta name="description" content="Et: category-based trend word clouds (KR/global) and links to analysis pages" />
    <link rel="stylesheet" href="./assets/css/styles.css" />
  </head>
  <body data-page="home">
    <a class="skip-link" href="#main">Skip to content</a>

    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="./index.html" aria-label="Et home">Et</a>

        <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="site-nav">
          <span class="sr-only">Open menu</span>
          <span class="nav-toggle__bar"></span>
          <span class="nav-toggle__bar"></span>
          <span class="nav-toggle__bar"></span>
        </button>

        <nav id="site-nav" class="site-nav" aria-label="Primary">
          <a class="nav-link" href="./index.html" data-nav="home">Home</a>
          <a class="nav-link" href="./agri-analytics.html" data-nav="agri-analytics">Agri prices</a>
          <a class="nav-link" href="./analysis-2.html" data-nav="health">Health</a>
          <a class="nav-link" href="./analysis-3.html" data-nav="traffic">Traffic</a>
          <a class="nav-link" href="./analysis-4.html" data-nav="tour">Tourism</a>
          <a class="nav-link" href="./analysis-5.html" data-nav="env">Environment</a>
        </nav>
      </div>
    </header>

    <main id="main" class="site-main">
  <div id="last-updated-bar" class="last-updated-bar">Checking last update time…</div>
      <div class="container dashboard">
        <div class="dashboard-grid">

          <section class="wordcloud-panel" aria-label="Trend word cloud">
            <div class="panel-head">
              <div>
                <h2 class="panel-title">Trend word cloud</h2>
                <p class="panel-desc">Filter by category to focus on a topic.</p>
              </div>
            </div>

            <div class="filters" aria-label="Category filter">
              <button class="chip is-active" type="button" data-category="all">All</button>
              <button class="chip" type="button" data-category="agri">Agriculture</button>
              <button class="chip" type="button" data-category="health">Health</button>
              <button class="chip" type="button" data-category="traffic">Traffic</button>
              <button class="chip" type="button" data-category="tour">Tourism</button>
              <button class="chip" type="button" data-category="env">Environment</button>
            </div>

            <div class="wc-region-tabs" role="tablist" aria-label="Region">
              <button class="wc-tab is-active" type="button" data-region="kr" role="tab" aria-selected="true">Korea</button>
              <button class="wc-tab" type="button" data-region="global" role="tab" aria-selected="false">Global</button>
            </div>

            <div class="wc-panel is-active" id="wc-panel-kr">
              <div class="wordcloud" id="cloud-kr" role="img" aria-label="Korea trend word cloud"></div>
            </div>
            <div class="wc-panel" id="wc-panel-global">
              <div class="wordcloud" id="cloud-global" role="img" aria-label="Global trend word cloud"></div>
            </div>
          </section>

          <aside class="dashboard-sidebar" aria-label="Trend summary">

            <div class="sidebar-card">
              <p class="sidebar-title">Top keywords</p>
              <div id="sidebar-kpi" class="kpi-list">
                <p class="kpi-loading">Loading…</p>
              </div>
            </div>

            <div class="sidebar-card">
              <p class="sidebar-title">Analysis pages</p>
              <nav class="quick-links" aria-label="Analysis shortcuts">
                <a class="quick-link" href="./agri-analytics.html">
                  <span>Agri prices</span>
                  <span class="quick-link__arrow">›</span>
                </a>
                <a class="quick-link" href="./analysis-2.html">
                  <span>Health · infection</span>
                  <span class="quick-link__arrow">›</span>
                </a>
                <a class="quick-link" href="./analysis-3.html">
                  <span>Traffic</span>
                  <span class="quick-link__arrow">›</span>
                </a>
                <a class="quick-link" href="./analysis-4.html">
                  <span>Tourism</span>
                  <span class="quick-link__arrow">›</span>
                </a>
                <a class="quick-link" href="./analysis-5.html">
                  <span>Environment</span>
                  <span class="quick-link__arrow">›</span>
                </a>
              </nav>
            </div>

          </aside>

        </div>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <a class="brand brand--sm" href="./index.html" aria-label="Et home">Et</a>
        <p class="muted">Public data insights</p>
      </div>
    </footer>

    <script src="./assets/js/config.js"></script>
    <script src="./assets/js/common.js"></script>
    <script src="./assets/js/auth.js"></script>
    <script src="./assets/js/index.js"></script>
  </body>
</html>
