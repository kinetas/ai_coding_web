<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DataGarden | 로그인</title>
    <meta name="description" content="DataGarden 데모 로그인" />
    <link rel="stylesheet" href="./assets/css/styles.css" />
  </head>
  <body data-page="login">
    <a class="skip-link" href="#main">본문으로 건너뛰기</a>

    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="./index.html" aria-label="DataGarden 홈">DataGarden</a>

        <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="site-nav">
          <span class="sr-only">메뉴 열기</span>
          <span class="nav-toggle__bar"></span>
          <span class="nav-toggle__bar"></span>
          <span class="nav-toggle__bar"></span>
        </button>

        <nav id="site-nav" class="site-nav" aria-label="주 메뉴">
          <a class="nav-link" href="./index.html" data-nav="home">홈</a>
          <a class="nav-link" href="./agri-analytics.html" data-nav="agri-analytics">농산물 가격</a>
          <a class="nav-link" href="./agri-news.html" data-nav="agri-news">뉴스</a>
          <a class="nav-link" href="./agri-weather.html" data-nav="agri-weather">기상</a>
          
          
          
          
        </nav>
      </div>
    </header>

    <main id="main" class="site-main">
      <section class="hero">
        <div class="container">
          <p class="badge">로그인</p>
          <h1 class="page-title">내 분석을 쓰려면 로그인</h1>
          <p class="page-subtitle">로그인 후 분석 만들기와 저장된 분석을 이용할 수 있습니다.</p>
        </div>
      </section>

      <section class="panel">
        <div class="container">
          <article class="card card--form" style="max-width: 480px; margin: 0 auto;">
            <h2 class="panel-title">로그인</h2>
            <p class="panel-desc">이메일과 비밀번호를 입력하세요.</p>

            <div class="alert alert--error" id="login-error" role="alert" aria-live="polite" hidden></div>
            <div class="alert alert--success" id="login-success" role="status" aria-live="polite" hidden></div>

            <form class="form" id="login-form" novalidate>
              <label class="field">
                <span class="field__label">이메일</span>
                <input class="input" type="email" name="email" autocomplete="username" placeholder="예: demo@datagarden.ai" required />
              </label>

              <label class="field">
                <span class="field__label">비밀번호</span>
                <input class="input" type="password" name="password" autocomplete="current-password" placeholder="4자 이상" required />
              </label>

              <button class="btn" type="submit">로그인</button>
              <a class="btn btn--ghost" href="./index.html">홈</a>
            </form>

            <p style="margin-top: 1.5rem; text-align: center; font-size: 0.9rem;">
              계정이 없으신가요? <a href="./register.html">회원가입</a>
            </p>
          </article>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <a class="brand brand--sm" href="./index.html" aria-label="DataGarden 홈">DataGarden</a>
        <p class="muted">로그인</p>
      </div>
    </footer>

    <script src="./assets/js/config.js"></script>
<script src="./assets/js/common.js"></script>
    <script src="./assets/js/auth.js"></script>
    <script src="./assets/js/login.js"></script>
  </body>
</html>
