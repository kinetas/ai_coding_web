<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Et | 로그인</title>
    <meta name="description" content="Et 데모 로그인" />
    <link rel="stylesheet" href="./assets/css/styles.css" />
  </head>
  <body data-page="login">
    <a class="skip-link" href="#main">본문으로 건너뛰기</a>

    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="./index.html" aria-label="Et 홈">Et</a>

        <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="site-nav">
          <span class="sr-only">메뉴 열기</span>
          <span class="nav-toggle__bar"></span>
          <span class="nav-toggle__bar"></span>
          <span class="nav-toggle__bar"></span>
        </button>

        <nav id="site-nav" class="site-nav" aria-label="주 메뉴">
          <a class="nav-link" href="./index.html" data-nav="home">홈</a>
          <a class="nav-link" href="./agri-analytics.html" data-nav="agri-analytics">농산물 가격</a>
          <a class="nav-link" href="./analysis-2.html" data-nav="health">보건</a>
          <a class="nav-link" href="./analysis-3.html" data-nav="traffic">교통</a>
          <a class="nav-link" href="./analysis-4.html" data-nav="tour">관광</a>
          <a class="nav-link" href="./analysis-5.html" data-nav="env">환경</a>
        </nav>
      </div>
    </header>

    <main id="main" class="site-main">
      <section class="hero">
        <div class="container">
          <p class="badge">로그인</p>
          <h1 class="page-title">내 분석을 쓰려면 로그인</h1>
          <p class="page-subtitle">로그인 후 분석 만들기와 저장된 분석을 이용할 수 있습니다.</p>
        </div>
      </section>

      <section class="panel">
        <div class="container">
          <div class="grid">
            <article class="card card--form">
              <h2 class="panel-title">로그인</h2>
              <p class="panel-desc">이메일과 비밀번호를 입력하세요.</p>

              <div class="alert alert--error" id="login-error" role="alert" aria-live="polite" hidden></div>
              <div class="alert alert--success" id="login-success" role="status" aria-live="polite" hidden></div>

              <form class="form" id="login-form" novalidate>
                <label class="field">
                  <span class="field__label">이메일</span>
                  <input class="input" type="email" name="email" autocomplete="username" placeholder="예: demo@et.ai" required />
                </label>

                <label class="field">
                  <span class="field__label">비밀번호</span>
                  <input class="input" type="password" name="password" autocomplete="current-password" placeholder="4자 이상" required />
                </label>

                <button class="btn" type="submit">로그인</button>
                <a class="btn btn--ghost" href="./index.html">홈</a>
              </form>
            </article>

            <article class="card">
              <h3>회원가입 또는 데모</h3>
              <p>계정을 만들거나 준비된 데모 계정을 사용하세요.</p>
              <div class="alert alert--error" id="register-error" role="alert" aria-live="polite" hidden></div>
              <div class="alert alert--success" id="register-success" role="status" aria-live="polite" hidden></div>

              <form class="form" id="register-form" novalidate style="margin-bottom: 20px;">
                <label class="field">
                  <span class="field__label">닉네임</span>
                  <input class="input" type="text" name="name" autocomplete="nickname" placeholder="예: 데모 사용자" required />
                </label>

                <label class="field">
                  <span class="field__label">이메일</span>
                  <input class="input" type="email" name="email" autocomplete="email" placeholder="예: hello@example.com" required />
                </label>

                <label class="field">
                  <span class="field__label">비밀번호</span>
                  <input class="input" type="password" name="password" autocomplete="new-password" placeholder="8자 이상" required />
                </label>

                <button class="btn btn--ghost" type="submit">회원가입</button>
              </form>

            </article>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <a class="brand brand--sm" href="./index.html" aria-label="Et 홈">Et</a>
        <p class="muted">로그인</p>
      </div>
    </footer>

    <script src="./assets/js/config.js"></script>
<script src="./assets/js/common.js"></script>
    <script src="./assets/js/auth.js"></script>
    <script src="./assets/js/login.js"></script>
  </body>
</html>
