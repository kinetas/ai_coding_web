<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Et | Sign in</title>
    <meta name="description" content="Et demo sign-in" />
    <link rel="stylesheet" href="./assets/css/styles.css" />
  </head>
  <body data-page="login">
    <a class="skip-link" href="#main">Skip to content</a>

    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="./index.html" aria-label="Et home">Et</a>

        <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="site-nav">
          <span class="sr-only">Open menu</span>
          <span class="nav-toggle__bar"></span>
          <span class="nav-toggle__bar"></span>
          <span class="nav-toggle__bar"></span>
        </button>

        <nav id="site-nav" class="site-nav" aria-label="Primary">
          <a class="nav-link" href="./index.html" data-nav="home">Home</a>
          <a class="nav-link" href="./agri-analytics.html" data-nav="agri-analytics">Agri prices</a>
          <a class="nav-link" href="./analysis-2.html" data-nav="health">Health</a>
          <a class="nav-link" href="./analysis-3.html" data-nav="traffic">Traffic</a>
          <a class="nav-link" href="./analysis-4.html" data-nav="tour">Tourism</a>
          <a class="nav-link" href="./analysis-5.html" data-nav="env">Environment</a>
        </nav>
      </div>
    </header>

    <main id="main" class="site-main">
      <section class="hero">
        <div class="container">
          <p class="badge">Sign in</p>
          <h1 class="page-title">Sign in for My analysis</h1>
          <p class="page-subtitle">After signing in you can use Build analysis and Saved analyses.</p>
        </div>
      </section>

      <section class="panel">
        <div class="container">
          <div class="grid">
            <article class="card card--form">
              <h2 class="panel-title">Sign in</h2>
              <p class="panel-desc">Enter email and password.</p>

              <div class="alert alert--error" id="login-error" role="alert" aria-live="polite" hidden></div>
              <div class="alert alert--success" id="login-success" role="status" aria-live="polite" hidden></div>

              <form class="form" id="login-form" novalidate>
                <label class="field">
                  <span class="field__label">Email</span>
                  <input class="input" type="email" name="email" autocomplete="username" placeholder="e.g. demo@et.ai" required />
                </label>

                <label class="field">
                  <span class="field__label">Password</span>
                  <input class="input" type="password" name="password" autocomplete="current-password" placeholder="4+ characters" required />
                </label>

                <button class="btn" type="submit">Sign in</button>
                <a class="btn btn--ghost" href="./index.html">Home</a>
              </form>
            </article>

            <article class="card">
              <h3>Register or demo</h3>
              <p>Create an account or use a prepared demo account.</p>
              <div class="alert alert--error" id="register-error" role="alert" aria-live="polite" hidden></div>
              <div class="alert alert--success" id="register-success" role="status" aria-live="polite" hidden></div>

              <form class="form" id="register-form" novalidate style="margin-bottom: 20px;">
                <label class="field">
                  <span class="field__label">Nickname</span>
                  <input class="input" type="text" name="name" autocomplete="nickname" placeholder="e.g. Demo User" required />
                </label>

                <label class="field">
                  <span class="field__label">Email</span>
                  <input class="input" type="email" name="email" autocomplete="email" placeholder="e.g. hello@example.com" required />
                </label>

                <label class="field">
                  <span class="field__label">Password</span>
                  <input class="input" type="password" name="password" autocomplete="new-password" placeholder="8+ characters" required />
                </label>

                <button class="btn btn--ghost" type="submit">Register</button>
              </form>

            </article>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <a class="brand brand--sm" href="./index.html" aria-label="Et home">Et</a>
        <p class="muted">Sign in</p>
      </div>
    </footer>

    <script src="./assets/js/config.js"></script>
<script src="./assets/js/common.js"></script>
    <script src="./assets/js/auth.js"></script>
    <script src="./assets/js/login.js"></script>
  </body>
</html>
