<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Et | Manual steps (Playwright)</title>
    <meta name="robots" content="noindex,nofollow" />
    <link rel="stylesheet" href="./assets/css/styles.css" />
  </head>
  <body data-page="manual-handoff" class="manual-handoff--locked">
    <a class="skip-link" href="#manual-panel">Skip to panel</a>

    <div class="manual-handoff__backdrop" aria-hidden="true"></div>

    <main id="manual-panel" class="manual-handoff__panel" role="dialog" aria-modal="true" aria-labelledby="manual-title">
      <p class="badge">Manual step · automation paused</p>
      <h1 id="manual-title">Instructions</h1>
      <p class="muted" id="manual-desc"></p>
      <ol class="manual-handoff__list" id="manual-steps"></ol>

      <div class="alert alert--error" id="manual-hint" role="note" hidden></div>

      <button class="btn" type="button" id="manual-done-btn">Done · continue automation</button>
      <a class="btn btn--ghost" href="./index.html" style="margin-top:10px; display:inline-flex">Home</a>

      <div id="manual-continue-block" hidden>
        <p class="manual-handoff__signal" id="pw-continue-text">PLAYWRIGHT_MANUAL_CONTINUE</p>
        <p class="muted" style="margin-top:10px; font-size:12px">When this text is visible, Playwright MCP can proceed.</p>
      </div>
    </main>

    <script>
      (function () {
        var STEPS = {
          supabase: {
            title: "Add Supabase keys to config",
            desc: "Finish the steps below, then click the button so automation can continue.",
            items: [
              "In Supabase dashboard → Project Settings → API, copy Project URL and anon public key.",
              "Open frontend/assets/js/config.js locally, set supabaseUrl and supabaseAnonKey, save.",
              "In Authentication, ensure the Email provider is enabled.",
              "Refresh the login page in the browser and retry if needed."
            ]
          },
          login: {
            title: "Prepare account or sign in",
            desc: "Make sure you can sign in, then continue.",
            items: [
              "Create a test user under Supabase Authentication → Users, or register via the form.",
              "If email confirmation is on, complete verification from the email link.",
              "Confirm email/password sign-in works on the login page."
            ]
          },
          backend: {
            title: "Run FastAPI backend",
            desc: "The backend is required for wordcloud and analysis APIs.",
            items: [
              "In ai_coding_web, activate venv and install requirements.",
              "Run uvicorn backend.app.main:app on 127.0.0.1:8000.",
              "Check GET /api/health.",
              "Ensure frontend/assets/js/config.js apiBase matches the backend URL."
            ]
          },
          default: {
            title: "Manual task",
            desc: "Complete the work the agent described, then press the button below.",
            items: [
              "Follow instructions from chat/logs.",
              "Finish any save/build/dashboard steps that need a human.",
              "Press the button below to resume automation."
            ]
          }
        };

        function $(id) {
          return document.getElementById(id);
        }

        function render() {
          var params = new URLSearchParams(window.location.search || "");
          var step = (params.get("step") || "default").toLowerCase();
          var data = STEPS[step] || STEPS.default;
          $("manual-title").textContent = data.title;
          $("manual-desc").textContent = data.desc;
          var ol = $("manual-steps");
          ol.innerHTML = "";
          (data.items || []).forEach(function (text) {
            var li = document.createElement("li");
            li.textContent = text;
            ol.appendChild(li);
          });
          var hint = params.get("hint");
          var hintEl = $("manual-hint");
          if (hint) {
            hintEl.hidden = false;
            hintEl.textContent = decodeURIComponent(hint);
          }
        }

        function onDone() {
          $("manual-done-btn").disabled = true;
          $("manual-done-btn").hidden = true;
          $("manual-continue-block").hidden = false;
          document.body.setAttribute("data-playwright-manual-done", "1");
          try {
            window.dispatchEvent(new CustomEvent("et-manual-handoff-complete"));
          } catch (e) {}
        }

        document.addEventListener("DOMContentLoaded", function () {
          render();
          $("manual-done-btn").addEventListener("click", onDone);
        });
      })();
    </script>
  </body>
</html>
