<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Et | 마이페이지</title>
    <meta name="description" content="프로필 및 저장된 분석" />
    <link rel="stylesheet" href="./assets/css/styles.css" />
  </head>
  <body data-page="mypage">
    <a class="skip-link" href="#main">본문으로 건너뛰기</a>

    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="./index.html" aria-label="Et 홈">Et</a>

        <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="site-nav">
          <span class="sr-only">메뉴 열기</span>
          <span class="nav-toggle__bar"></span>
          <span class="nav-toggle__bar"></span>
          <span class="nav-toggle__bar"></span>
        </button>

        <nav id="site-nav" class="site-nav" aria-label="주 메뉴">
          <a class="nav-link" href="./index.html" data-nav="home">홈</a>
          <a class="nav-link" href="./agri-analytics.html" data-nav="agri-analytics">농산물 가격</a>
          <a class="nav-link" href="./analysis-2.html" data-nav="health">보건</a>
          <a class="nav-link" href="./analysis-3.html" data-nav="traffic">교통</a>
          <a class="nav-link" href="./analysis-4.html" data-nav="tour">관광</a>
          <a class="nav-link" href="./analysis-5.html" data-nav="env">환경</a>
        </nav>
      </div>
    </header>

    <main id="main" class="site-main">
<section id="preset-bar" class="preset-bar">
  <h3 class="preset-bar__title">빠른 시작</h3>
  <div class="preset-card-grid" id="preset-card-grid">
  </div>
</section>

      <section class="hero">
        <div class="container">
          <p class="badge">마이페이지</p>
          <h1 class="page-title">프로필 · 내 분석</h1>
          <p class="page-subtitle">프로필을 수정하거나 저장된 분석으로 이동하세요.</p>
        </div>
      </section>

      <section class="panel">
        <div class="container">
          <div class="grid">
            <article class="card">
              <h2 class="panel-title">바로가기</h2>
              <p class="panel-desc">저장 목록을 엽니다.</p>
              <div class="filters">
                <a class="btn" href="./my-analyses.html">저장된 분석</a>
                <a class="btn btn--ghost" href="./my-analysis.html">분석 만들기</a>
              </div>
            </article>

            <article class="card card--form">
              <h2 class="panel-title">프로필</h2>
              <p class="panel-desc">닉네임은 화면에 표시됩니다. 이메일은 로그인 ID이며 여기서는 바꿀 수 없습니다.</p>

              <div class="alert alert--error" id="profile-error" role="alert" aria-live="polite" hidden></div>
              <div class="alert alert--success" id="profile-success" role="status" aria-live="polite" hidden></div>

              <form class="form" id="profile-form" novalidate>
                <label class="field">
                  <span class="field__label">닉네임</span>
                  <input class="input" type="text" name="nickname" id="field-nickname" autocomplete="nickname" maxlength="80" />
                </label>
                <label class="field">
                  <span class="field__label">이메일</span>
                  <input class="input" type="email" name="email" id="field-email" autocomplete="email" readonly style="opacity:0.6;cursor:default" />
                </label>
                <button class="btn" type="submit">저장</button>
              </form>
            </article>

            <article class="card card--form">
              <h2 class="panel-title">계정 삭제</h2>
              <p class="panel-desc">계정을 삭제하면 프로필과 저장된 분석이 모두 제거됩니다. 되돌릴 수 없습니다.</p>
              <div class="alert alert--error" id="delete-error" role="alert" aria-live="polite" hidden></div>
              <label class="field">
                <span class="field__label">확인을 위해 <strong>DELETE</strong>를 정확히 입력하세요</span>
                <input class="input" type="text" id="delete-confirm" autocomplete="off" placeholder="DELETE" />
              </label>
              <button class="btn btn--ghost" type="button" id="delete-account-btn" style="color: var(--danger, #e85d6f)">
                계정 삭제
              </button>
            </article>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <a class="brand brand--sm" href="./index.html" aria-label="Et 홈">Et</a>
        <p class="muted">마이페이지</p>
      </div>
    </footer>

    <script src="./assets/js/config.js"></script>
    <script src="./assets/js/common.js"></script>
    <script src="./assets/js/auth.js"></script>
    <script src="./assets/js/mypage.js"></script>
  </body>
</html>
