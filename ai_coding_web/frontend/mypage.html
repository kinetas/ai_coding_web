<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Et | 마이페이지</title>
    <meta name="description" content="회원 정보 및 내 분석 바로가기" />
    <link rel="stylesheet" href="./assets/css/styles.css" />
  </head>
  <body data-page="mypage">
    <a class="skip-link" href="#main">본문으로 건너뛰기</a>

    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="./index.html" aria-label="Et 홈으로 이동">Et</a>

        <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="site-nav">
          <span class="sr-only">메뉴 열기</span>
          <span class="nav-toggle__bar"></span>
          <span class="nav-toggle__bar"></span>
          <span class="nav-toggle__bar"></span>
        </button>

        <nav id="site-nav" class="site-nav" aria-label="주요 메뉴">
          <a class="nav-link" href="./index.html" data-nav="home">메인</a>
          <a class="nav-link" href="./agri-analytics.html" data-nav="agri-analytics">농산물 시세</a>
          <a class="nav-link" href="./analysis-2.html" data-nav="health">의료</a>
          <a class="nav-link" href="./analysis-3.html" data-nav="traffic">교통</a>
          <a class="nav-link" href="./analysis-4.html" data-nav="tour">관광</a>
          <a class="nav-link" href="./analysis-5.html" data-nav="env">환경</a>
        </nav>
      </div>
    </header>

    <main id="main" class="site-main">
      <section class="hero">
        <div class="container">
          <p class="badge">마이페이지</p>
          <h1 class="page-title">회원 정보 · 내 분석</h1>
          <p class="page-subtitle">프로필을 수정하거나 저장된 분석으로 이동할 수 있습니다.</p>
        </div>
      </section>

      <section class="panel">
        <div class="container">
          <div class="grid">
            <article class="card">
              <h2 class="panel-title">바로가기</h2>
              <p class="panel-desc">저장해 둔 분석 목록을 확인하세요.</p>
              <div class="filters">
                <a class="btn" href="./my-analyses.html">내 분석 보기</a>
                <a class="btn btn--ghost" href="./my-analysis.html">내 분석 만들기</a>
              </div>
            </article>

            <article class="card card--form">
              <h2 class="panel-title">회원 정보 수정</h2>
              <p class="panel-desc">이메일 변경 시 Supabase에서 확인 메일을 보낼 수 있습니다. 닉네임은 화면 표시에 쓰입니다.</p>

              <div class="alert alert--error" id="profile-error" role="alert" aria-live="polite" hidden></div>
              <div class="alert alert--success" id="profile-success" role="status" aria-live="polite" hidden></div>

              <form class="form" id="profile-form" novalidate>
                <label class="field">
                  <span class="field__label">닉네임</span>
                  <input class="input" type="text" name="nickname" id="field-nickname" autocomplete="nickname" maxlength="80" />
                </label>
                <label class="field">
                  <span class="field__label">이메일</span>
                  <input class="input" type="email" name="email" id="field-email" autocomplete="email" required />
                </label>
                <button class="btn" type="submit">저장</button>
              </form>
            </article>

            <article class="card card--form">
              <h2 class="panel-title">회원 탈퇴</h2>
              <p class="panel-desc">계정을 삭제하면 Supabase 인증 계정과 서버에 저장된 내 분석 데이터가 함께 삭제됩니다. 되돌릴 수 없습니다.</p>
              <div class="alert alert--error" id="delete-error" role="alert" aria-live="polite" hidden></div>
              <label class="field">
                <span class="field__label">확인을 위해 <strong>탈퇴</strong>를 입력하세요</span>
                <input class="input" type="text" id="delete-confirm" autocomplete="off" placeholder="탈퇴" />
              </label>
              <button class="btn btn--ghost" type="button" id="delete-account-btn" style="color: var(--danger, #e85d6f)">
                회원 탈퇴
              </button>
            </article>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <a class="brand brand--sm" href="./index.html" aria-label="Et 홈으로 이동">Et</a>
        <p class="muted">마이페이지</p>
      </div>
    </footer>

    <script src="./assets/js/config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.0/dist/umd/supabase.js"></script>
    <script src="./assets/js/common.js"></script>
    <script src="./assets/js/auth.js"></script>
    <script src="./assets/js/mypage.js"></script>
  </body>
</html>
