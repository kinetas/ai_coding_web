services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-etapp}
      POSTGRES_USER: ${POSTGRES_USER:-etuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-etuser} -d ${POSTGRES_DB:-etapp}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=5)",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 60s
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-etuser}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-etapp}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://datagarden.p-e.kr}
      AUTH_COOKIE_NAME: ${AUTH_COOKIE_NAME:-et_session}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-true}
      AUTH_COOKIE_SAMESITE: ${AUTH_COOKIE_SAMESITE:-strict}
      AUTH_SESSION_TTL_HOURS: ${AUTH_SESSION_TTL_HOURS:-168}
      AUTH_SEED_DEMO_USER: ${AUTH_SEED_DEMO_USER:-false}
      AUTH_DEMO_USER_EMAIL: ${AUTH_DEMO_USER_EMAIL:-}
      AUTH_DEMO_USER_PASSWORD: ${AUTH_DEMO_USER_PASSWORD:-}
      ETL_SHARED_SECRET: ${ETL_SHARED_SECRET:?ETL_SHARED_SECRET is required}
      DATA_GO_KR_SERVICE_KEY: ${DATA_GO_KR_SERVICE_KEY:-}
      AT_PRICE_API_PATH: ${AT_PRICE_API_PATH:-}
    expose:
      - "8000"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot:ro

  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --quiet --webroot -w /var/www/certbot; sleep 12h & wait $${!}; done"

volumes:
  postgres_data:
  certbot_certs:
  certbot_webroot:
